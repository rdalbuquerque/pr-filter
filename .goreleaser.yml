version: 2

builds:
  - id: pr-filter-tui
    main: ./cmd/pr-filter-tui
    binary: pr-filter-tui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: pr-fetcher
    main: ./cmd/pr-fetcher
    binary: pr-fetcher
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: pr-evaluator
    main: ./cmd/pr-evaluator
    binary: pr-evaluator
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: pr-filter-tui
    builds:
      - pr-filter-tui
    name_template: "pr-filter-tui_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

  - id: pr-fetcher
    builds:
      - pr-fetcher
    name_template: "pr-fetcher_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  - id: pr-evaluator
    builds:
      - pr-evaluator
    name_template: "pr-evaluator_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
